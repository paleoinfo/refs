services:
  refs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: refs-app
    ports:
      - "3010:3010"
    environment:
      # Flask Configuration
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=3010
      
      # SSO Configuration
      - SSO_MODE=${SSO_MODE:-dev}
      - JWT_SECRET=${REFS_JWT_SECRET:-dev-secret-change-in-production}
      - APP_AUDIENCE=${APP_AUDIENCE:-refs-app}
      - PORTAL_URL=${PORTAL_URL:-http://localhost:5000}
      
      # Application Configuration
      - SERVER_SECRET_KEY=${SERVER_SECRET_KEY:-dev-secret-change-in-production}
      - DEBUG=${DEBUG:-False}
      
      # User and Rate Limiting
      - DEV_USER_EMAIL=${DEV_USER_EMAIL:-demo@example.com}
      - MAX_SESSIONS_PER_USER=${MAX_SESSIONS_PER_USER:-3}
      - MAX_SESSIONS_GLOBAL=${MAX_SESSIONS_GLOBAL:-100}
    
    volumes:
      # Persisti i documenti degli utenti
      - refs_documents_data:/app/documents
      # Persisti i dati dell'applicazione
      - refs_data:/app/data
    
    restart: unless-stopped
    
    # Configurazione di rete
    networks:
      - refs_network
    
    # Limiti di risorse (opzionale)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  refs_documents_data:
    driver: local
  refs_data:
    driver: local

networks:
  refs_network:
    driver: bridge
